version: "3"
services:
  pg:
    image: postgres:14.0-alpine
    container_name: db
    command: >
      postgres -c max_wal_size=20GB
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    logging:
      options:
        max-size: 10m
        max-file: "3"
    ports:
      # Host-side port is configurable so the compose stack can coexist with
      # another postgres on 5432 (e.g. during `pixi run -e dev e2e` on a dev
      # host that already runs an unrelated DB). Container port is fixed.
      - "${PGMIMIC_HOST_PORT:-5432}:5432"
    volumes:
      - db-data:/var/lib/postgresql/data/
    healthcheck:
      test: ["CMD", "pg_isready", "-q", "-d", "${POSTGRES_DB}", "-U", "${POSTGRES_USER}"]
      interval: 10s
      timeout: 3s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 4096m # 6Gi limit, change if needed
  mimic_import:
    container_name: mimic_import
    build:
      dockerfile: ./mimic_import.dockerfile
      context: .
    image: mimic_import
    environment:
     - DB_USER=${POSTGRES_USER}
     - DB_PASSWORD=${POSTGRES_PASSWORD}
     - PYTHONUNBUFFERED=1
    depends_on:
      pg:
        condition: service_healthy
    links:
      - pg
    volumes:
     - ${MIMIC_DATA_PATH}:/usr/src/app/data:z
     - ./config.json:/usr/src/app/config.json:ro,z
    deploy:
      resources:
        limits:
          memory: 1024m # 6Gi limit, change if needed

# Local Storage 
volumes:
 db-data:

