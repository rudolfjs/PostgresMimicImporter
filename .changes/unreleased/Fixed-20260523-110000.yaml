kind: Fixed
body: '`_write_mimic_data` and `_check_data` now skip schemas whose `tables` entry is a `dict` (i.e. SQL-function outputs like `mimic_derived` / `mimiciv_derived`), not just the hardcoded literal `"mimic_derived"`. The previous string check silently failed to skip 3.1''s renamed `mimiciv_derived` schema — the COPY loop then iterated the dict `{"demographics": ["age"]}` as if it were a table list, looked for `demographics.csv.gz`, and raised `FileNotFoundError`. The new `DataHandler._data_schemas()` helper filters by value type so the rule stays version-agnostic for any future concepts-style schema additions. `_check_data` gets the same treatment so re-import detection no longer queries for non-existent `derived.demographics` tables.'
time: 2026-05-23T11:00:00.000000000+10:00
