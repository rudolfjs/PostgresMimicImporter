kind: Added
body: 'Synthetic CSV fixtures + Pandera schemas for MIMIC-IV 3.1 (`tests/fixtures/mimiciv/3.1/`). 8 representative tables covered: `admissions`, `patients`, `drgcodes`, `provider`, `services` (hosp), `icustays`, `caregiver` (icu), `edstays` (ed). `pixi run -e dev validate-fixtures` walks every `.csv.gz` and validates against its Pandera schema; the task is wired into the CI matrix and the lefthook pre-push hook. `pixi run -e dev generate-fixtures` regenerates the CSVs when schemas drift.'
