kind: Changed
body: '`ConfigHandler` now returns a Pydantic `Config` model instead of a raw dict — bad `config.json` raises `pydantic.ValidationError` loudly instead of being silently swallowed and printed. Callers in `_db_handler` and `mimic_importer` migrate to dotted attribute access (e.g. `config.database.host`).'
