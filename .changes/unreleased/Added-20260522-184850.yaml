kind: Added
body: Version-aware `data.versions` map in `config.json`. When `data.versions[data.version]` exists, its `schemas` and `tables` override the legacy top-level keys; otherwise the legacy keys still win. Default `version` stays `"2.2"` — existing users see no change. 3.1 users opt in by editing one field.
