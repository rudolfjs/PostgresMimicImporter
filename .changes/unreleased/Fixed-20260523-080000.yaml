kind: Fixed
body: '`pixi run -e dev e2e` now actually works end-to-end on real MIMIC-IV data. (a) The importer step runs via `<runtime> run --rm --build mimic_import` instead of `pixi run mimic-import`, so it inherits the `${MIMIC_DATA_PATH}` bind-mount on `/usr/src/app/data` and can resolve the `pg` hostname on the compose network — the host-shell flavour silently ignored both. (b) Row-count parsing now unpacks the four columns the upstream `validate.sql` returns (`tbl, expected, observed, ROW_COUNT_CHECK`) instead of three, and uses the SQL verdict column for the pass/fail decision. Surfaced by `/codex:rescue` review on commits 179b4a3 / 4cc88ea. The PR template''s changie reminder also drops the spurious `-e dev` flag (changie is not in `pixi.lock`) to match the spec''s §5.10 wording.'
time: 2026-05-23T08:00:00.000000000+10:00
