kind: Fixed
body: 'Three more `pixi run -e dev e2e` gaps closed after a second `/codex:rescue` review on the first fix. (1) The host-side `psycopg2` connect now reads `POSTGRES_USER` / `POSTGRES_PASSWORD` / `POSTGRES_DB` from `.env` (the same file compose substitutes into the `pg` container) when the shell has not exported them — previously the defaults `postgres` / empty did not match the `mimic` / `mimic123` credentials compose was using, so the validate step failed at auth. (2) A new `.dockerignore` keeps the `data/` directory, `mimiciv3.1/` snapshot, and assorted caches out of the `<runtime> build` context that the e2e task now triggers — without it a `--build` would have shipped the entire MIMIC dataset to the container daemon. (3) README e2e subsection and `tests/e2e.py` docstring updated to describe the actual compose-based importer flow and the new `--build` step.'
time: 2026-05-23T08:25:00.000000000+10:00
